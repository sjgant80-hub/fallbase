<style>
:root{
  --void:#0b0a0f; --void-2:#13121a; --ink:#1a1922; --ink-2:#22212c;
  --line:#2a2934; --line-soft:#1f1e28;
  --cream:#e6e1d6; --cream-dim:#a8a395; --cream-muted:#6e6a5e;
  --brass:#b8974a; --amber:#ff8c00; --ox:#8b1a1a;
  --green:#4ade80; --red:#ef4444; --blue:#60a5fa; --yellow:#fbbf24;
  --serif:Georgia,'Libre Baskerville',ui-serif,serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--cream);font-family:var(--sans);font-size:13px}
button,input,select,textarea{font:inherit;color:inherit}
button{background:transparent;border:1px solid var(--line);color:var(--cream-dim);padding:5px 10px;cursor:pointer;border-radius:3px;transition:all .12s}
button:hover{border-color:var(--brass);color:var(--cream)}
button.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
button.primary:hover{background:var(--amber);border-color:var(--amber)}
button.danger:hover{border-color:var(--red);color:var(--red)}
input,select,textarea{background:var(--void-2);border:1px solid var(--line);padding:5px 8px;border-radius:3px;color:var(--cream);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brass)}
textarea{font-family:var(--mono);resize:vertical}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{height:42px;display:flex;align-items:center;gap:12px;padding:0 14px;background:var(--void-2);border-bottom:1px solid var(--line);flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px;font-weight:700}
.mark{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,var(--brass),var(--amber));display:grid;place-items:center;font-family:var(--serif);font-size:16px;color:var(--void)}
.brand-name{font-family:var(--serif);font-size:15px;letter-spacing:.5px}
.brand-sub{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:.5px}
.tabs{display:flex;gap:2px;margin-left:auto}
.tab{padding:5px 12px;border-radius:3px;cursor:pointer;color:var(--cream-muted);font-size:12px}
.tab:hover{color:var(--cream)}
.tab.active{background:var(--ink);color:var(--brass)}
.db-pick{display:flex;align-items:center;gap:6px;margin-left:8px}
.db-pick select{font-family:var(--mono);font-size:11px}
.badge{font-family:var(--mono);font-size:10px;padding:3px 7px;border:1px solid var(--line);border-radius:10px;color:var(--cream-muted)}
.badge.t3{border-color:var(--green);color:var(--green)}
.icon-btn{width:28px;height:28px;display:grid;place-items:center;padding:0;border:none;font-size:14px}
.body{flex:1;display:flex;overflow:hidden}
.sidebar{width:240px;background:var(--void-2);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-sec{border-bottom:1px solid var(--line);padding:8px}
.side-h{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.side-h button{padding:2px 6px;font-size:10px}
.side-list{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
.side-item{padding:5px 8px;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.side-item:hover{background:var(--ink)}
.side-item.active{background:var(--ink);color:var(--brass)}
.side-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-item .actions{display:none;gap:2px}
.side-item:hover .actions{display:flex}
.side-item .actions button{padding:1px 5px;font-size:10px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:8px 14px;background:var(--void-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.toolbar .spacer{flex:1}
.workspace{flex:1;overflow:auto;padding:14px}
.empty{display:grid;place-items:center;height:100%;color:var(--cream-muted);text-align:center;padding:20px}
.empty h2{font-family:var(--serif);font-size:24px;margin-bottom:8px;color:var(--cream-dim)}
.empty p{font-size:13px;max-width:380px;margin-bottom:14px;line-height:1.6}
.schema-grid{display:grid;gap:10px}
.col-card{background:var(--ink);border:1px solid var(--line);border-radius:5px;padding:10px;display:grid;grid-template-columns:30px 1fr 100px 80px 80px 80px 80px 60px;gap:6px;align-items:center}
.col-card input,.col-card select{padding:3px 6px;font-size:11px}
.col-card .pos{font-family:var(--mono);color:var(--cream-muted);font-size:10px;text-align:center}
.col-card label{font-size:10px;color:var(--cream-muted);display:flex;align-items:center;gap:3px}
.data-tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:4px;background:var(--void-2);max-height:calc(100vh - 180px)}
.data-tbl{border-collapse:collapse;font-family:var(--mono);font-size:11px;width:100%}
.data-tbl th{background:var(--ink-2);padding:6px 8px;text-align:left;font-weight:600;color:var(--brass);border-bottom:2px solid var(--line);position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
.data-tbl th:hover{background:var(--ink)}
.data-tbl th .sort-ind{color:var(--amber);margin-left:4px}
.data-tbl td{padding:4px 8px;border-bottom:1px solid var(--line-soft);white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}
.data-tbl tr:hover{background:rgba(184,151,74,.05)}
.data-tbl td input{width:100%;background:transparent;border:1px solid transparent;padding:2px 4px;font-family:var(--mono);font-size:11px}
.data-tbl td input:focus{border-color:var(--brass);background:var(--void)}
.data-tbl .row-actions{display:flex;gap:3px}
.data-tbl .row-actions button{padding:1px 5px;font-size:10px}
.pager{display:flex;align-items:center;gap:8px;padding:8px 0;font-family:var(--mono);font-size:11px;color:var(--cream-muted)}
.pager input{width:60px}
.query-area{display:grid;grid-template-rows:1fr auto 1fr;height:calc(100vh - 100px);gap:8px}
.query-input{font-family:var(--mono);font-size:13px;padding:10px;min-height:120px;width:100%}
.query-results{overflow:auto;border:1px solid var(--line);border-radius:4px;background:var(--void-2);padding:8px}
.query-toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.qside{width:260px;border-left:1px solid var(--line);background:var(--void-2);padding:10px;overflow-y:auto;flex-shrink:0}
.qside h3{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px}
.qside h3:first-child{margin-top:0}
.qside-item{padding:6px 8px;background:var(--ink);border:1px solid var(--line-soft);border-radius:3px;margin-bottom:4px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--cream-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qside-item:hover{border-color:var(--brass);color:var(--cream)}
.qside-item .x{float:right;color:var(--red);padding:0 4px;cursor:pointer}
.tab-pane{display:none;height:100%}
.tab-pane.active{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tab-pane.active .workspace{flex:1;overflow:auto}
.query-layout{display:flex;flex:1;overflow:hidden}
.query-main{flex:1;padding:14px;display:flex;flex-direction:column;overflow:hidden}
.tbl-list-item{padding:5px 8px;border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:11px;display:flex;justify-content:space-between;gap:4px}
.tbl-list-item:hover{background:var(--ink)}
.tbl-list-item.active{background:var(--ink);color:var(--brass)}
.tbl-list-item .rc{color:var(--cream-muted);font-size:10px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-family:var(--serif);font-size:18px;margin-bottom:12px;color:var(--brass)}
.modal .field{margin-bottom:10px}
.modal label{display:block;font-size:11px;color:var(--cream-muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal select,.modal textarea{width:100%}
.modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
/* Palette */
.palette-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding-top:80px;z-index:200}
.palette-bg.show{display:flex}
.palette{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;width:600px;max-width:90%;overflow:hidden;box-shadow:0 10px 50px rgba(0,0,0,.5)}
.palette-hd{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--line)}
.palette-hd .glyph{font-family:var(--serif);font-size:18px;color:var(--brass)}
.palette-hd input{flex:1;border:none;background:transparent;font-size:14px;padding:4px}
.palette-bd{padding:8px;max-height:400px;overflow-y:auto}
.palette-item{padding:10px;border-radius:4px;cursor:pointer;border:1px solid transparent}
.palette-item:hover{background:var(--ink);border-color:var(--line)}
.palette-item .ti{font-weight:600;color:var(--cream);font-size:13px;margin-bottom:3px}
.palette-item .de{font-size:11px;color:var(--cream-muted);font-family:var(--mono)}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);border:1px solid var(--brass);border-radius:4px;padding:10px 16px;font-size:12px;z-index:300;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.ok{border-color:var(--green);color:var(--green)}
.drop-overlay{position:fixed;inset:0;background:rgba(184,151,74,.1);border:3px dashed var(--brass);display:none;align-items:center;justify-content:center;z-index:50;font-family:var(--serif);font-size:24px;color:var(--brass);pointer-events:none}
.drop-overlay.show{display:flex}
.fk-hint{font-size:10px;color:var(--blue);margin-left:4px}
.idx-hint{font-size:10px;color:var(--amber);margin-left:4px}
@media (max-width:760px){
  .sidebar{width:170px}
  .qside{display:none}
  .col-card{grid-template-columns:1fr;gap:4px}
  .hdr{padding:0 8px;gap:6px}
  .brand-sub{display:none}
}
</style>

<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).
 *
 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

  // ─── Toast ───────────────────────────────────────────────────────
  function notify(msg, kind) {

      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';
    t.style.color = kind === 'err' ? '#fff' : '#0a0a0a';
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2400);

          <select id="fk-model" style="width:100%;padding:8px 11px;background:#22212c;border:1px solid #3a342c;color:#ebe3d2;border-radius:3px;font-size:13px;font-family:inherit">
            ${Object.entries(WEBLLM_MODELS).map(([k,m]) => `<option value="${k}"${(STATE.config.webllm_model||DEFAULT_MODEL)===k?' selected':''}>${esc(m.label)} · ${esc(m.size)}</option>`).join('')}

    });

      const m = $('#fk-model').value;
      loadWebLLM(m);
    });

      if (STATE.mesh.active) { STATE.mesh.bc?.close(); STATE.mesh.active = false; STATE.mesh.bc = null; notify('Mesh disconnected'); }

      openSettings();  // refresh modal

    $('#fk-save').onclick = () => {
      STATE.config.ai_tier = $('#fk-tier').value;

      if (newKey) STATE.config.api_key = newKey;

        <tbody>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T0</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">Off. The seed works fully. No AI · no downloads · no API calls.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T2</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">WebLLM in-browser. Pick a model: 1B (700MB, fast) → 3B (2GB, balanced) → 7B (5GB, capable) → 70B (40GB, frontier). One-time download, runs offline forever after. Zero data leaves your device.</td></tr>
          <tr><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#c08a3a;font-weight:600">T3</td><td style="padding:6px 10px;border-top:1px solid #2a2934;color:#a89e88">BYOK · Anthropic Claude · OpenAI GPT · Google Gemini. You bring the API key, you pay the provider direct. Key stays in your browser, sent direct to the provider, never proxied.</td></tr>

    </div>`;
  }

  // ─── CSS for AI chip ─────────────────────────────────────────────
  function injectCss() {
    if (document.getElementById('fk-css')) return;
    const s = document.createElement('style');
    s.id = 'fk-css';
    s.textContent = `
      #fk-ai-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:3px; font-family:ui-monospace,Menlo,monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; font-weight:600; cursor:pointer; border:1px solid #3a342c; background:#1a1922; color:#a89e88; user-select:none; vertical-align:middle }

      .fk-ai-assist:hover { background:#c08a3a; color:#0a0a0a }
      .fk-ai-assist::before { content:'✦'; font-size:12px }
    `;
    document.head.appendChild(s);
  }

  // ─── KCC Mint launcher (v1.2 · fork-this-seed shortcut) ──────────
  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
    const name = document.title.replace(/^[◊·\s]+/, '').split('·')[0].trim() || slug;
    const url = location.href.split('?')[0].split('#')[0];
    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });
    window.open(KCC_MINT_URL + '?' + params.toString(), '_blank', 'noopener');
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};
    injectCss();
    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }
    const chip = document.createElement('button');
    chip.id = 'fk-ai-chip';
    chip.title = 'AI cascade · click to configure tier and model';
    chip.innerHTML = '<span class="fk-dot"></span><span id="fk-ai-chip-text">T0 · off</span>';
    chip.onclick = openSettings;
    // Try anchor first, fall back to floating bottom-right
    const anchor = opts.chipAnchor ? $(opts.chipAnchor) : null;
    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);
    }
    // v1.2 · floating mint button next to chip
    if (!$('#fk-mint-btn') && !opts.hideMint) {
      const mintBtn = document.createElement('button');
      mintBtn.id = 'fk-mint-btn';
      mintBtn.title = 'Mint a fork of this seed as a KCC bundle · provenance economy';
      mintBtn.innerHTML = '<span style="font-size:13px">✦</span> mint fork';
      mintBtn.style.cssText = 'position:fixed;bottom:14px;left:130px;z-index:9998;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid #c08a3a;color:#c08a3a;background:rgba(10,10,15,.7);box-shadow:0 4px 14px rgba(0,0,0,.4)';
      mintBtn.onmouseover = () => { mintBtn.style.background = '#c08a3a'; mintBtn.style.color = '#0a0a0a'; };
      mintBtn.onmouseout  = () => { mintBtn.style.background = 'rgba(10,10,15,.7)'; mintBtn.style.color = '#c08a3a'; };
      mintBtn.onclick = openMint;
      document.body.appendChild(mintBtn);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,
    closeSettings: closeSettings,
    renderAiChip: renderAiChip,
    helpSection: helpSection,
    meshStart: meshStart,
    meshPost: meshPost,
    notify: notify,
    openMint: openMint,  // v1.2 · launch kcc-mint with this seed prefilled as parent
    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

</script>

// ===== IDB =====
let idb=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const r=indexedDB.open('fallbase',1);
    r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv')};
    r.onsuccess=e=>{idb=e.target.result;resolve()};
    r.onerror=e=>reject(e);
  });
}
function idbGet(k){return new Promise(res=>{const tx=idb.transaction('kv','readonly');const r=tx.objectStore('kv').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null)});}
function idbSet(k,v){return new Promise(res=>{const tx=idb.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=()=>res()});}

async function persist(){
  await idbSet('state',{dbs:state.dbs,activeDb:state.activeDb,queryHistory:state.queryHistory,savedQueries:state.savedQueries,settings:state.settings});
}
async function loadState(){
  const s=await idbGet('state');
  if(s){
    state.dbs=s.dbs||{};
    state.activeDb=s.activeDb||'main';
    state.queryHistory=s.queryHistory||[];
    state.savedQueries=s.savedQueries||[];
    state.settings=Object.assign(state.settings,s.settings||{});
  }
  if(!state.dbs[state.activeDb])state.dbs[state.activeDb]={tables:{}};
  if(!state.dbs.main)state.dbs.main={tables:{}};
}

// ===== UTIL =====
function $(s){return document.querySelector(s)}
function $$(s){return Array.from(document.querySelectorAll(s))}
function toast(msg,cls){const t=$('#toast');t.className='toast show '+(cls||'');t.textContent=msg;clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function curDb(){return state.dbs[state.activeDb]}
function curTbl(){return curDb()?.tables?.[state.activeTbl]||null}
function uniqId(){return Math.random().toString(36).slice(2,9)}

// type coercion
function coerce(val,type){
  if(val==null||val==='')return type==='text'?'':null;
  switch(type){
    case 'integer':{const n=parseInt(val,10);return isNaN(n)?null:n}
    case 'real':{const n=parseFloat(val);return isNaN(n)?null:n}
    case 'boolean':return val===true||val==='true'||val==='1'||val===1;
    case 'date':return String(val);
    case 'json':try{return typeof val==='string'?JSON.parse(val):val}catch{return val}
    default:return String(val)
  }
}
function inferType(v){
  if(v===null||v===undefined||v==='')return 'text';
  if(typeof v==='boolean')return 'boolean';
  if(typeof v==='number')return Number.isInteger(v)?'integer':'real';
  if(typeof v==='object')return 'json';
  const s=String(v);
  if(/^-?\d+$/.test(s))return 'integer';
  if(/^-?\d+\.\d+$/.test(s))return 'real';
  if(/^(true|false)$/i.test(s))return 'boolean';
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return 'date';
  return 'text';
}

// ===== INDEX MGMT =====
function rebuildIndex(tbl,colName){
  const m=new Map();
  for(let i=0;i<tbl.rows.length;i++){
    const v=tbl.rows[i][colName];
    const key=v==null?'__null__':v;
    if(!m.has(key))m.set(key,new Set());
    m.get(key).add(i);
  }
  tbl.indexes=tbl.indexes||{};
  tbl.indexes[colName]={map:Array.from(m.entries())}; // serialize-friendly
}
function getIndex(tbl,colName){
  if(!tbl.indexes||!tbl.indexes[colName])return null;
  // hydrate to Map for lookup
  const ix=tbl.indexes[colName];
  if(!ix._m){ix._m=new Map(ix.map.map(([k,v])=>[k,new Set(v)]))}
  return ix._m;
}
function invalidateIndexes(tbl){
  if(!tbl.indexes)return;
  for(const k in tbl.indexes)delete tbl.indexes[k]._m;
  for(const k in tbl.indexes)rebuildIndex(tbl,k);
}

// ===== SQL TOKENIZER =====
const KEYWORDS=new Set(['SELECT','DISTINCT','FROM','WHERE','AND','OR','NOT','ORDER','BY','LIMIT','GROUP','HAVING','ASC','DESC','INNER','LEFT','JOIN','ON','AS','LIKE','IN','BETWEEN','IS','NULL','TRUE','FALSE','COUNT','SUM','AVG','MIN','MAX']);
function tokenize(sql){
  const t=[];let i=0;const n=sql.length;
  while(i<n){
    const c=sql[i];
    if(/\s/.test(c)){i++;continue}
    if(c==='-'&&sql[i+1]==='-'){while(i<n&&sql[i]!=='\n')i++;continue}
    if(c==="'"){let s='';i++;while(i<n&&sql[i]!=="'"){if(sql[i]==="\\"&&i+1<n){s+=sql[i+1];i+=2}else{s+=sql[i++]}}i++;t.push({type:'string',value:s});continue}
    if(c==='"'){let s='';i++;while(i<n&&sql[i]!=='"')s+=sql[i++];i++;t.push({type:'ident',value:s});continue}
    if(/[0-9]/.test(c)){let s='';while(i<n&&/[0-9.]/.test(sql[i]))s+=sql[i++];t.push({type:'number',value:parseFloat(s)});continue}
    if(/[a-zA-Z_]/.test(c)){let s='';while(i<n&&/[a-zA-Z0-9_]/.test(sql[i]))s+=sql[i++];const up=s.toUpperCase();if(KEYWORDS.has(up))t.push({type:'keyword',value:up});else t.push({type:'ident',value:s});continue}
    if(c==='*'){t.push({type:'star',value:'*'});i++;continue}
    if(c===','){t.push({type:'comma',value:','});i++;continue}
    if(c==='.'){t.push({type:'dot',value:'.'});i++;continue}
    if(c==='('){t.push({type:'lparen',value:'('});i++;continue}
    if(c===')'){t.push({type:'rparen',value:')'});i++;continue}
    if(c==='='){t.push({type:'op',value:'='});i++;continue}
    if(c==='<'){if(sql[i+1]==='='){t.push({type:'op',value:'<='});i+=2}else if(sql[i+1]==='>'){t.push({type:'op',value:'!='});i+=2}else{t.push({type:'op',value:'<'});i++}continue}
    if(c==='>'){if(sql[i+1]==='='){t.push({type:'op',value:'>='});i+=2}else{t.push({type:'op',value:'>'});i++}continue}
    if(c==='!'){if(sql[i+1]==='='){t.push({type:'op',value:'!='});i+=2;continue}}
    if(c===';'){i++;continue}
    throw new Error('unexpected character at '+i+': '+c);
  }
  return t;
}

// ===== SQL PARSER =====
function parse(tokens){
  let p=0;
  function peek(o){return tokens[p+(o||0)]}
  function eat(type,val){const t=tokens[p];if(!t)throw new Error('unexpected EOF');if(type&&t.type!==type)throw new Error('expected '+type+' got '+t.type+' ('+t.value+')');if(val!==undefined&&t.value!==val)throw new Error('expected '+val+' got '+t.value);p++;return t}
  function isKw(v){const t=peek();return t&&t.type==='keyword'&&t.value===v}
  function consumeKw(v){if(isKw(v)){p++;return true}return false}

  function parseSelect(){
    eat('keyword','SELECT');
    const distinct=consumeKw('DISTINCT');
    const columns=parseColumns();
    eat('keyword','FROM');
    const from=parseTableRef();
    const joins=[];
    while(peek()&&(isKw('INNER')||isKw('LEFT')||isKw('JOIN'))){
      let kind='INNER';
      if(consumeKw('INNER')){eat('keyword','JOIN')}
      else if(consumeKw('LEFT')){kind='LEFT';eat('keyword','JOIN')}
      else if(consumeKw('JOIN')){}
      const t=parseTableRef();
      eat('keyword','ON');
      const on=parseExpr();
      joins.push({kind,table:t,on});
    }
    let where=null;
    if(consumeKw('WHERE'))where=parseExpr();
    let groupBy=null;
    if(consumeKw('GROUP')){eat('keyword','BY');groupBy=[parseColRef()];while(peek()&&peek().type==='comma'){p++;groupBy.push(parseColRef())}}
    let having=null;
    if(consumeKw('HAVING'))having=parseExpr();
    let orderBy=null;
    if(consumeKw('ORDER')){eat('keyword','BY');orderBy={col:parseColRef(),dir:'asc'};if(consumeKw('ASC'))orderBy.dir='asc';else if(consumeKw('DESC'))orderBy.dir='desc'}
    let limit=null;
    if(consumeKw('LIMIT')){const t=eat('number');limit=t.value}
    return {type:'select',distinct,columns,from,joins,where,groupBy,having,orderBy,limit};
  }
  function parseColumns(){
    const cols=[];
    cols.push(parseColumnItem());
    while(peek()&&peek().type==='comma'){p++;cols.push(parseColumnItem())}
    return cols;
  }
  function parseColumnItem(){
    if(peek().type==='star'){p++;return {kind:'star'}}
    // could be table.* or func or expr
    if(peek().type==='ident'&&peek(1)&&peek(1).type==='dot'&&peek(2)&&peek(2).type==='star'){
      const t=eat('ident').value;p++;p++;return {kind:'tablestar',table:t};
    }
    const e=parseExpr();
    let alias=null;
    if(consumeKw('AS')){alias=eat('ident').value}
    else if(peek()&&peek().type==='ident'){alias=eat('ident').value}
    return {kind:'expr',expr:e,alias};
  }
  function parseTableRef(){
    const name=eat('ident').value;
    let alias=null;
    if(consumeKw('AS')){alias=eat('ident').value}
    else if(peek()&&peek().type==='ident'&&!(peek().type==='keyword')){alias=eat('ident').value}
    return {name,alias};
  }
  function parseColRef(){
    const a=eat('ident').value;
    if(peek()&&peek().type==='dot'){p++;const b=eat('ident').value;return {table:a,column:b}}
    return {table:null,column:a};
  }
  // Expression parsing (precedence climbing)
  function parseExpr(){return parseOr()}
  function parseOr(){let left=parseAnd();while(isKw('OR')){p++;const right=parseAnd();left={type:'binop',op:'OR',left,right}}return left}
  function parseAnd(){let left=parseNot();while(isKw('AND')){p++;const right=parseNot();left={type:'binop',op:'AND',left,right}}return left}
  function parseNot(){if(consumeKw('NOT')){return {type:'unop',op:'NOT',expr:parseNot()}}return parseCmp()}
  function parseCmp(){
    let left=parseAddl();
    // BETWEEN / IN / IS / LIKE / op
    if(isKw('BETWEEN')){p++;const lo=parseAddl();if(isKw('AND')){p++;const hi=parseAddl();return {type:'between',expr:left,lo,hi}}}
    if(isKw('IN')){p++;eat('lparen');const list=[];list.push(parseAddl());while(peek()&&peek().type==='comma'){p++;list.push(parseAddl())}eat('rparen');return {type:'in',expr:left,list}}
    if(isKw('IS')){p++;let neg=false;if(consumeKw('NOT'))neg=true;eat('keyword','NULL');return {type:'isnull',expr:left,negate:neg}}
    if(isKw('LIKE')){p++;const pat=parseAddl();return {type:'like',expr:left,pattern:pat}}
    if(isKw('NOT')){const nx=peek(1);if(nx&&nx.type==='keyword'&&(nx.value==='LIKE'||nx.value==='IN'||nx.value==='BETWEEN')){p++;const inner=parseCmp();return {type:'unop',op:'NOT',expr:inner.type==='cmp'?inner:Object.assign({},inner,{__neg:true})}}}
    if(peek()&&peek().type==='op'){const op=eat('op').value;const right=parseAddl();return {type:'binop',op,left,right}}
    return left;
  }
  function parseAddl(){return parseAtom()}
  function parseAtom(){
    const t=peek();
    if(!t)throw new Error('unexpected EOF');
    if(t.type==='lparen'){p++;const e=parseExpr();eat('rparen');return e}
    if(t.type==='number'){p++;return {type:'lit',value:t.value}}
    if(t.type==='string'){p++;return {type:'lit',value:t.value}}
    if(t.type==='keyword'&&t.value==='NULL'){p++;return {type:'lit',value:null}}
    if(t.type==='keyword'&&t.value==='TRUE'){p++;return {type:'lit',value:true}}
    if(t.type==='keyword'&&t.value==='FALSE'){p++;return {type:'lit',value:false}}
    if(t.type==='keyword'&&['COUNT','SUM','AVG','MIN','MAX'].includes(t.value)){
      const fn=t.value;p++;eat('lparen');
      if(peek().type==='star'){p++;eat('rparen');return {type:'func',name:fn,args:[{type:'star'}]}}
      const arg=parseExpr();eat('rparen');
      return {type:'func',name:fn,args:[arg]};
    }
    if(t.type==='ident'){
      const a=t.value;p++;
      if(peek()&&peek().type==='dot'){p++;const b=eat('ident').value;return {type:'col',table:a,column:b}}
      return {type:'col',table:null,column:a};
    }
    throw new Error('unexpected token: '+t.type+' '+t.value);
  }
  const stmt=parseSelect();
  if(p<tokens.length)throw new Error('trailing tokens at '+p+': '+JSON.stringify(tokens[p]));
  return stmt;
}

// ===== SQL EXECUTOR =====
function resolveTable(name){
  const db=curDb();
  if(!db.tables[name])throw new Error('no such table: '+name);
  return db.tables[name];
}
function evalExpr(expr,row){
  if(!expr)return null;
  switch(expr.type){
    case 'lit':return expr.value;
    case 'col':{
      if(expr.table){
        const key=expr.table+'.'+expr.column;
        if(key in row)return row[key];
        // try alias
        return row[expr.column]??null;
      }
      return row[expr.column]??null;
    }
    case 'binop':{
      const op=expr.op;
      if(op==='AND')return evalExpr(expr.left,row)&&evalExpr(expr.right,row);
      if(op==='OR')return evalExpr(expr.left,row)||evalExpr(expr.right,row);
      const l=evalExpr(expr.left,row), r=evalExpr(expr.right,row);
      if(op==='=')return l==r;
      if(op==='!=')return l!=r;
      if(op==='<')return l<r;
      if(op==='>')return l>r;
      if(op==='<=')return l<=r;
      if(op==='>=')return l>=r;
      return null;
    }
    case 'unop':{
      const v=evalExpr(expr.expr,row);
      if(expr.op==='NOT')return !v;
      return null;
    }
    case 'between':{const v=evalExpr(expr.expr,row);return v>=evalExpr(expr.lo,row)&&v<=evalExpr(expr.hi,row)}
    case 'in':{const v=evalExpr(expr.expr,row);return expr.list.some(e=>v==evalExpr(e,row))}
    case 'isnull':{const v=evalExpr(expr.expr,row);const isN=(v===null||v===undefined);return expr.negate?!isN:isN}
    case 'like':{const v=evalExpr(expr.expr,row);const p=evalExpr(expr.pattern,row);if(v==null||p==null)return false;const re=new RegExp('^'+String(p).replace(/[.+^${}()|[\]\\]/g,'\\$&').replace(/%/g,'.*').replace(/_/g,'.')+'$','i');return re.test(String(v))}
    case 'func':return null; // handled in aggregate phase
  }
  return null;
}
function flattenRow(tableName,row,alias){
  const out={};
  const prefix=alias||tableName;
  for(const k in row){out[prefix+'.'+k]=row[k];if(!(k in out))out[k]=row[k];}
  // unprefixed for single-table queries
  for(const k in row)if(!(k in out))out[k]=row[k];
  return out;
}
function execute(ast){
  if(ast.type!=='select')throw new Error('only SELECT supported');
  const fromTbl=resolveTable(ast.from.name);
  const fromAlias=ast.from.alias||ast.from.name;
  // index optimization for simple WHERE col = lit on the from table
  let rows=[];
  let usedIndex=false;
  if(!ast.joins.length&&ast.where&&ast.where.type==='binop'&&ast.where.op==='='&&ast.where.left.type==='col'&&ast.where.right.type==='lit'){
    const col=ast.where.left.column;
    const idx=getIndex(fromTbl,col);
    if(idx){
      const key=ast.where.right.value;
      const set=idx.get(key==null?'__null__':key);
      if(set){for(const i of set){rows.push(flattenRow(ast.from.name,fromTbl.rows[i],fromAlias))}}
      usedIndex=true;
    }
  }
  if(!usedIndex){
    for(const r of fromTbl.rows)rows.push(flattenRow(ast.from.name,r,fromAlias));
  }
  // JOINs
  for(const j of ast.joins){
    const jt=resolveTable(j.table.name);
    const jAlias=j.table.alias||j.table.name;
    const out=[];
    for(const left of rows){
      let matched=false;
      for(const r of jt.rows){
        const right=flattenRow(j.table.name,r,jAlias);
        const merged={...left,...right};
        // unprefixed fields take from right (or left)
        if(evalExpr(j.on,merged)){
          out.push(merged);
          matched=true;
        }
      }
      if(!matched&&j.kind==='LEFT'){
        // fill rightside with nulls
        const nulls={};
        for(const c of jt.cols)nulls[jAlias+'.'+c.name]=null;
        out.push({...left,...nulls});
      }
    }
    rows=out;
  }
  // WHERE
  if(ast.where&&!usedIndex){
    rows=rows.filter(r=>!!evalExpr(ast.where,r));
  }
  // GROUP BY + aggregates
  const hasAgg=ast.columns.some(c=>c.kind==='expr'&&c.expr.type==='func');
  if(ast.groupBy||hasAgg){
    const groups=new Map();
    for(const r of rows){
      const key=ast.groupBy?ast.groupBy.map(g=>r[g.table?g.table+'.'+g.column:g.column]).join('\x00'):'_';
      if(!groups.has(key))groups.set(key,[]);
      groups.get(key).push(r);
    }
    let outRows=[];
    for(const [key,group] of groups){
      const out={};
      if(ast.groupBy){
        for(const g of ast.groupBy){
          const k=g.table?g.table+'.'+g.column:g.column;
          out[k]=group[0][k];
          if(g.column&&!out[g.column])out[g.column]=group[0][k];
        }
      }
      for(const c of ast.columns){
        if(c.kind==='expr'&&c.expr.type==='func'){
          const fn=c.expr.name;const arg=c.expr.args[0];
          let val;
          if(fn==='COUNT'){
            if(arg.type==='star')val=group.length;
            else val=group.filter(r=>evalExpr(arg,r)!=null).length;
          } else {
            const vals=group.map(r=>evalExpr(arg,r)).filter(v=>v!=null&&!isNaN(parseFloat(v))).map(v=>parseFloat(v));
            if(fn==='SUM')val=vals.reduce((a,b)=>a+b,0);
            else if(fn==='AVG')val=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
            else if(fn==='MIN')val=vals.length?Math.min(...vals):null;
            else if(fn==='MAX')val=vals.length?Math.max(...vals):null;
          }
          const lbl=c.alias||(fn+'('+(arg.type==='star'?'*':(arg.column||'expr'))+')');
          out[lbl]=val;
        } else if(c.kind==='expr'){
          const lbl=c.alias||(c.expr.column||'expr');
          out[lbl]=evalExpr(c.expr,group[0]);
        }
      }
      out.__group=group;
      outRows.push(out);
    }
    // HAVING
    if(ast.having)outRows=outRows.filter(r=>!!evalExpr(ast.having,r));
    rows=outRows;
  } else {
    // project columns
    if(!(ast.columns.length===1&&ast.columns[0].kind==='star')){
      rows=rows.map(r=>{
        const out={};
        for(const c of ast.columns){
          if(c.kind==='star'){Object.assign(out,r)}
          else if(c.kind==='tablestar'){for(const k in r)if(k.startsWith(c.table+'.'))out[k.split('.')[1]]=r[k]}
          else {
            const lbl=c.alias||(c.expr.type==='col'?c.expr.column:'expr');
            out[lbl]=evalExpr(c.expr,r);
          }
        }
        return out;
      });
    } else {
      // strip table.col duplicates for single-table queries
      rows=rows.map(r=>{
        const out={};
        for(const k in r){
          if(k.includes('.')){const bare=k.split('.')[1];if(!(bare in out))out[bare]=r[k]}
          else out[k]=r[k];
        }
        return out;
      });
    }
  }
  // DISTINCT
  if(ast.distinct){
    const seen=new Set();const out=[];
    for(const r of rows){const k=JSON.stringify(r);if(!seen.has(k)){seen.add(k);out.push(r)}}
    rows=out;
  }
  // ORDER BY
  if(ast.orderBy){
    const col=ast.orderBy.col.column;
    const dir=ast.orderBy.dir==='desc'?-1:1;
    // try index for sort
    const ix=ast.joins.length?null:getIndex(fromTbl,col);
    rows.sort((a,b)=>{
      const av=a[col],bv=b[col];
      if(av==null&&bv==null)return 0;
      if(av==null)return 1;
      if(bv==null)return -1;
      if(av<bv)return -1*dir;
      if(av>bv)return 1*dir;
      return 0;
    });
  }
  // LIMIT
  if(ast.limit!=null)rows=rows.slice(0,ast.limit);
  return rows;
}

function runSQL(sql){
  const tokens=tokenize(sql);
  const ast=parse(tokens);
  return execute(ast);
}

// ===== RENDER =====
function renderDbList(){
  const el=$('#dbList');el.innerHTML='';
  for(const name in state.dbs){
    const div=document.createElement('div');
    div.className='side-item'+(name===state.activeDb?' active':'');
    div.innerHTML=`<span class="name">${esc(name)}</span><span class="actions"><button data-act="rename" data-n="${esc(name)}">✎</button><button data-act="delete" data-n="${esc(name)}">×</button></span>`;
    div.onclick=e=>{
      if(e.target.tagName==='BUTTON'){
        const act=e.target.dataset.act, n=e.target.dataset.n;
        if(act==='rename'){const nn=prompt('rename db',n);if(nn&&nn!==n&&!state.dbs[nn]){state.dbs[nn]=state.dbs[n];delete state.dbs[n];if(state.activeDb===n)state.activeDb=nn;persist();renderAll()}}
        else if(act==='delete'){if(Object.keys(state.dbs).length<=1){toast('cannot delete last db','err');return}if(confirm('drop db '+n+'?')){delete state.dbs[n];if(state.activeDb===n)state.activeDb=Object.keys(state.dbs)[0];persist();renderAll()}}
        return;
      }
      state.activeDb=name;state.activeTbl=null;persist();renderAll();
    };
    el.appendChild(div);
  }
  const sel=$('#dbSelect');sel.innerHTML='';
  for(const n in state.dbs){const o=document.createElement('option');o.value=n;o.textContent=n;if(n===state.activeDb)o.selected=true;sel.appendChild(o);}
  sel.onchange=()=>{state.activeDb=sel.value;state.activeTbl=null;persist();renderAll();};
}
function renderTblList(){
  const el=$('#tblList');el.innerHTML='';
  const db=curDb();

function handleColChange(colName,field,val){
  const tbl=curTbl();const c=tbl.cols.find(x=>x.name===colName);if(!c)return;
  if(field==='name'){
    if(!val||val===colName)return;
    if(tbl.cols.find(x=>x.name===val)){toast('column exists','err');renderSchema();return;}
    for(const r of tbl.rows){r[val]=r[colName];delete r[colName]}
    if(tbl.indexes&&tbl.indexes[colName]){tbl.indexes[val]=tbl.indexes[colName];delete tbl.indexes[colName]}
    c.name=val;
  } else if(field==='type'){
    const old=c.type;c.type=val;
    for(const r of tbl.rows)r[c.name]=coerce(r[c.name],val);
  } else c[field]=val;
  persist();renderSchema();renderTblList();
}
function handleColAction(colName,act){
  const tbl=curTbl();
  if(act==='drop'){
    if(!confirm('drop column '+colName+'?'))return;
    tbl.cols=tbl.cols.filter(c=>c.name!==colName);
    for(const r of tbl.rows)delete r[colName];
    if(tbl.indexes)delete tbl.indexes[colName];
    tbl.fks=(tbl.fks||[]).filter(f=>f.column!==colName);
    persist();renderSchema();
  } else if(act==='ix'){
    if(tbl.indexes&&tbl.indexes[colName]){delete tbl.indexes[colName];toast('index dropped')}
    else {rebuildIndex(tbl,colName);toast('index built','ok')}
    persist();renderSchema();
  } else if(act==='fk'){
    showFkModal(colName);
  }
}

  }
  html+='</tbody></table></div>';
  html+=`<div class="pager">page <input id="pageInput" value="${state.page}" type="number" min="1" max="${totalPages}"> / ${totalPages} · <button id="pgPrev">‹ prev</button><button id="pgNext">next ›</button> · size <input id="pgSize" value="${state.pageSize}" type="number" min="1" style="width:50px"></div>`;
  ws.innerHTML=html;

      else {state.sortCol=c;state.sortDir='asc'}
      renderData();
    };
  });

        const col=inp.dataset.col;
        const colDef=tbl.cols.find(x=>x.name===col);
        const newVal=coerce(inp.value,colDef.type);
        if(!validateRowChange(tbl,i,col,newVal))return;
        tbl.rows[i][col]=newVal;
        if(tbl.indexes&&tbl.indexes[col])rebuildIndex(tbl,col);
        persist();
      };
    });
    tr.querySelector('button[data-act="del"]').onclick=()=>{
      if(!confirm('delete row?'))return;
      if(!validateDelete(tbl,i))return;
      cascadeDelete(tbl,i);
      tbl.rows.splice(i,1);
      invalidateIndexes(tbl);
      persist();renderData();renderTblList();
    };
  });
  $('#pgPrev').onclick=()=>{if(state.page>1){state.page--;renderData()}};
  $('#pgNext').onclick=()=>{if(state.page<totalPages){state.page++;renderData()}};

  $('#pgSize').onchange=e=>{const v=parseInt(e.target.value,10);if(v>0){state.pageSize=v;state.page=1;renderData()}};
}
function validateRowChange(tbl,rowIdx,col,newVal){
  const colDef=tbl.cols.find(c=>c.name===col);
  if(!colDef)return true;
  if(colDef.unique||colDef.primary){
    for(let i=0;i<tbl.rows.length;i++){if(i===rowIdx)continue;if(tbl.rows[i][col]===newVal&&newVal!=null){toast('unique constraint: '+col,'err');return false}}
  }
  if(!colDef.nullable&&newVal==null){toast('not null: '+col,'err');return false}
  // FK validation
  const fk=(tbl.fks||[]).find(f=>f.column===col);
  if(fk&&newVal!=null){
    const ref=curDb().tables[fk.refTable];
    if(ref){
      const found=ref.rows.find(r=>r[fk.refColumn]===newVal);
      if(!found){toast('fk fails: '+fk.refTable+'.'+fk.refColumn+' has no '+newVal,'err');return false}
    }
  }
  return true;
}
function validateDelete(tbl,rowIdx){
  // check incoming fks
  const db=curDb();
  const row=tbl.rows[rowIdx];
  for(const tn in db.tables){
    const t=db.tables[tn];
    for(const fk of (t.fks||[])){
      if(fk.refTable===state.activeTbl){
        const refersTo=row[fk.refColumn];
        const hits=t.rows.filter(r=>r[fk.column]===refersTo);
        if(hits.length){
          if(fk.onDelete==='restrict'){toast('delete blocked by fk from '+tn+'.'+fk.column,'err');return false}
        }
      }
    }
  }
  return true;
}
function cascadeDelete(tbl,rowIdx){
  const db=curDb();const row=tbl.rows[rowIdx];
  for(const tn in db.tables){
    const t=db.tables[tn];
    for(const fk of (t.fks||[])){
      if(fk.refTable===state.activeTbl){
        const refersTo=row[fk.refColumn];
        if(fk.onDelete==='cascade'){
          t.rows=t.rows.filter(r=>r[fk.column]!==refersTo);
          invalidateIndexes(t);
        } else if(fk.onDelete==='set null'){
          for(const r of t.rows)if(r[fk.column]===refersTo)r[fk.column]=null;
          invalidateIndexes(t);
        }
      }
    }
  }
}

  $('#queryStatus').textContent=rows.length+' rows';

function runQuery(){
  const sql=$('#queryInput').value.trim();
  if(!sql)return;
  try{
    const t0=performance.now();
    const rows=runSQL(sql);
    const dt=(performance.now()-t0).toFixed(1);
    renderResults(rows);
    state.queryResult=rows;
    $('#queryStatus').textContent=rows.length+' rows · '+dt+'ms';
    state.queryHistory.push(sql);
    if(state.queryHistory.length>20)state.queryHistory.shift();
    persist();renderQuery();
  }catch(e){
    renderResults(null,e.message);
    $('#queryStatus').textContent='error';
  }
}

function createTablePrompt(){
  const name=prompt('table name');if(!name)return;
  if(curDb().tables[name]){toast('table exists','err');return;}
  curDb().tables[name]={cols:[{name:'id',type:'integer',primary:true,unique:true,nullable:false}],rows:[],indexes:{},fks:[],nextId:1};
  state.activeTbl=name;persist();renderAll();
}
function addColumn(){
  const tbl=curTbl();if(!tbl){toast('no table','err');return;}
  const name=prompt('column name');if(!name)return;
  if(tbl.cols.find(c=>c.name===name)){toast('exists','err');return;}
  tbl.cols.push({name,type:'text',nullable:true});
  for(const r of tbl.rows)r[name]=null;
  persist();renderSchema();
}
function addRow(){
  const tbl=curTbl();if(!tbl){toast('no table','err');return;}
  const row={};
  for(const c of tbl.cols){
    if(c.primary&&c.type==='integer'){
      // auto-increment
      let maxv=0;for(const r of tbl.rows){const v=r[c.name];if(typeof v==='number'&&v>maxv)maxv=v}
      row[c.name]=maxv+1;
    } else if(c.default){row[c.name]=coerce(c.default,c.type)}
    else row[c.name]=null;
  }
  tbl.rows.push(row);
  invalidateIndexes(tbl);
  persist();renderData();renderTblList();
}

window.doExport=function(fmt){
  const tbl=curTbl();const data=fmt==='csv'?toCSV(tbl.rows,tbl.cols.map(c=>c.name)):JSON.stringify(tbl.rows,null,2);
  downloadFile(state.activeTbl+'.'+fmt,data,fmt==='csv'?'text/csv':'application/json');
  closeModal();
};
function toCSV(rows,cols){
  const esc=v=>{if(v==null)return '';const s=typeof v==='object'?JSON.stringify(v):String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s};
  return cols.join(',')+'\n'+rows.map(r=>cols.map(c=>esc(r[c])).join(',')).join('\n');
}
function downloadFile(name,data,mime){
  const blob=new Blob([data],{type:mime});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function parseCSV(txt){
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(inQ){if(c==='"'){if(txt[i+1]==='"'){cur+='"';i++}else inQ=false}else cur+=c}
    else {if(c==='"')inQ=true;
      else if(c===','){row.push(cur);cur=''}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur=''}
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur||row.length){row.push(cur);rows.push(row)}
  return rows;
}

function importFileToTable(file){
  const tbl=curTbl();if(!tbl){toast('select a table first','err');return;}
  const r=new FileReader();
  r.onload=()=>{
    try{
      let data;
      if(file.name.endsWith('.json')){data=JSON.parse(r.result);if(!Array.isArray(data))data=[data];}
      else {const lines=parseCSV(r.result);if(!lines.length)return;const headers=lines[0];data=lines.slice(1).filter(l=>l.length>1||l[0]).map(l=>{const o={};headers.forEach((h,i)=>o[h]=l[i]);return o;});}
      // import
      let added=0;
      for(const obj of data){
        const row={};
        for(const c of tbl.cols){row[c.name]=coerce(obj[c.name],c.type)}
        tbl.rows.push(row);added++;
      }
      invalidateIndexes(tbl);
      persist();renderAll();
      toast('imported '+added+' rows','ok');
    }catch(e){toast('import failed: '+e.message,'err')}
  };
  r.readAsText(file);
}

function importDbFile(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.dbs){Object.assign(state.dbs,data.dbs);}
      else if(data.tables){const n=prompt('import as db name','imported');if(!n)return;state.dbs[n]=data;state.activeDb=n;}
      persist();renderAll();toast('db imported','ok');
    }catch(e){toast('import failed: '+e.message,'err')}
  };
  r.readAsText(file);
}

// ===== CASCADE =====
const Cascade={
  async detectTier(){if(await this._probe())return'T2';const s=state.settings;if(s.anthropicKey||s.openaiKey||s.geminiKey||s.openrouterKey)return'T3';return'T0'},
  async _probe(){if(this._p!==undefined)return this._p;try{this._p=await Promise.race([fetch('http://127.0.0.1:11434/api/tags').then(r=>r.ok),new Promise(r=>setTimeout(()=>r(false),350))])}catch(e){this._p=false}return this._p},
  async generate(sys,user,maxTok){const s=state.settings,max=maxTok||1200;
    if(s.anthropicKey)try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':s.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:max,system:sys,messages:[{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·Claude',text:d?.content?.[0]?.text||''}}catch(e){}
    if(s.geminiKey)try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${s.geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{parts:[{text:user}]}]})});const d=await r.json();return{tier:'T3·Gemini',text:d?.candidates?.[0]?.content?.parts?.[0]?.text||''}}catch(e){}
    if(s.openaiKey)try{const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openaiKey},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:sys},{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·GPT',text:d?.choices?.[0]?.message?.content||''}}catch(e){}
    if(s.openrouterKey)try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.openrouterKey,'HTTP-Referer':location.origin},body:JSON.stringify({model:'anthropic/claude-haiku-4-5',messages:[{role:'system',content:sys},{role:'user',content:user}]})});const d=await r.json();return{tier:'T3·OpenRouter',text:d?.choices?.[0]?.message?.content||''}}catch(e){}
    return{tier:'T0',text:null}
  }
};
async function updateTierBadge(){const t=await Cascade.detectTier();const el=document.getElementById('tierBadge');if(el){el.textContent=t==='T0'?'offline':t;el.classList.toggle('t3',t!=='T0')}const p=document.getElementById('pTier');if(p){p.textContent=t==='T0'?'T0':t;p.classList.toggle('t3',t!=='T0')}}

// ===== Ω AUTOPILOT =====
const AUTOPILOT_TEMPLATES=[
  {title:'show overdue invoices',sql:"SELECT * FROM orders WHERE paid = 0 AND due_date < '2026-06-17'",match:/overdue|unpaid|owe|owed/i},
  {title:'show active customers',sql:"SELECT name, email FROM customers WHERE status = 'active' ORDER BY name",match:/active customer/i},
  {title:'monthly sales by product',sql:"SELECT product_id, SUM(total), COUNT(*) FROM orders GROUP BY product_id",match:/monthly sales|sales by product|product sales/i},
  {title:'top customers by total',sql:"SELECT c.name, SUM(o.total) FROM customers c INNER JOIN orders o ON c.id = o.customer_id GROUP BY c.name ORDER BY name DESC LIMIT 10",match:/top customer|biggest customer|best customer/i},
  {title:'low stock products',sql:"SELECT * FROM products WHERE stock < 50 ORDER BY stock",match:/low stock|out of stock|inventory/i},
  {title:'schema for SME customers',sql:"-- suggested schema:\n-- customers(id INTEGER PK, name TEXT, email TEXT, status TEXT, credit_limit REAL, created DATE)",match:/schema.*customer|customer.*schema/i},
  {title:'all tables',sql:'-- tables: '+Object.keys(curDb()?.tables||{}).join(', '),match:/list tables|show tables|all tables/i}
];
function openPalette(){
  $('#palette').classList.add('show');
  $('#pInput').value='';
  $('#pInput').focus();
  renderPalette('');
}
function closePalette(){$('#palette').classList.remove('show')}
function renderPalette(q){
  const body=$('#pBody');
  let items=AUTOPILOT_TEMPLATES;
  if(q){
    const matched=items.filter(it=>it.match.test(q)||it.title.toLowerCase().includes(q.toLowerCase()));
    items=matched.length?matched:items;
  }
  let html='';
  for(const it of items){
    html+=`<div class="palette-item" data-sql="${esc(it.sql)}"><div class="ti">${esc(it.title)}</div><div class="de">${esc(it.sql.slice(0,80))}</div></div>`;
  }
  if(q){
    html+=`<div class="palette-item" data-act="t3" data-q="${esc(q)}"><div class="ti">↑ ask autopilot (T3)</div><div class="de">parse intent into SQL via configured LLM</div></div>`;
  }
  body.innerHTML=html;
  body.querySelectorAll('.palette-item').forEach(el=>{
    el.onclick=async ()=>{
      if(el.dataset.act==='t3'){
        await autopilotT3(el.dataset.q);
      } else {
        $('#queryInput').value=el.dataset.sql;
        switchTab('query');
        closePalette();
      }
    };
  });
}
async function autopilotT3(q){
  const db=curDb();
  const schema=Object.entries(db.tables).map(([n,t])=>n+'('+t.cols.map(c=>c.name+' '+c.type).join(', ')+')').join('\n');
  const sys=`You are FallBase autopilot. Convert the user's intent into ONE SQL query against this schema:\n${schema}\n\nReturn ONLY the SQL, no explanation. Supported: SELECT with WHERE, GROUP BY, HAVING, ORDER BY, LIMIT, INNER/LEFT JOIN, COUNT/SUM/AVG/MIN/MAX. No subqueries, no CTEs.`;
  const r=await Cascade.generate(sys,q,400);
  if(r.text){
    let sql=r.text.replace(/```sql?/gi,'').replace(/```/g,'').trim();
    $('#queryInput').value=sql;
    switchTab('query');
    closePalette();
    toast('parsed by '+r.tier,'ok');
  } else {
    toast('no T3 key configured','err');
  }
}

// ===== TABS =====
function switchTab(tab){
  state.tab=tab;
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  $$('.tab-pane').forEach(p=>p.classList.toggle('active',p.dataset.pane===tab));
  renderAll();
}

// ===== BIND =====
function bind(){
  $$('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
  $('#autopilotBtn').onclick=openPalette;
  $('#settingsBtn').onclick=openSettings;
  $('#addDbBtn').onclick=()=>{const n=prompt('new database name');if(!n||state.dbs[n])return;state.dbs[n]={tables:{}};state.activeDb=n;state.activeTbl=null;persist();renderAll();};
  $('#addTblBtn').onclick=createTablePrompt;
  $('#sampleBtn').onclick=loadSample;
  $('#exportDbBtn').onclick=exportDb;
  $('#importDbBtn').onclick=()=>{const f=$('#fileInput');f.onchange=e=>{if(e.target.files[0])importDbFile(e.target.files[0])};f.click();};
  $('#addColBtn').onclick=addColumn;
  $('#renameTblBtn').onclick=()=>{const n=prompt('rename table',state.activeTbl);if(!n||n===state.activeTbl)return;const db=curDb();if(db.tables[n]){toast('exists','err');return}db.tables[n]=db.tables[state.activeTbl];delete db.tables[state.activeTbl];state.activeTbl=n;persist();renderAll();};
  $('#dropTblBtn').onclick=()=>{if(!state.activeTbl||!confirm('drop table '+state.activeTbl+'?'))return;delete curDb().tables[state.activeTbl];state.activeTbl=null;persist();renderAll();};
  $('#addRowBtn').onclick=addRow;
  $('#importCsvBtn').onclick=()=>{const f=$('#fileInput');f.onchange=e=>{if(e.target.files[0])importFileToTable(e.target.files[0])};f.click();};
  $('#exportRowsBtn').onclick=exportTblRows;
  $('#dataSearch').oninput=e=>{state.filter=e.target.value;state.page=1;renderData();};
  $('#dataSearchCol').onchange=e=>{state.filterCol=e.target.value;renderData();};
  $('#runBtn').onclick=runQuery;
  $('#queryInput').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runQuery()}});
  $('#saveQryBtn').onclick=()=>{const sql=$('#queryInput').value.trim();if(!sql)return;const n=prompt('save as');if(!n)return;state.savedQueries.push({name:n,sql});persist();renderQuery();toast('saved','ok')};
  $('#exportQryCsvBtn').onclick=()=>{if(!state.queryResult)return;const cols=Object.keys(state.queryResult[0]||{});downloadFile('query.csv',toCSV(state.queryResult,cols),'text/csv')};
  $('#exportQryJsonBtn').onclick=()=>{if(!state.queryResult)return;downloadFile('query.json',JSON.stringify(state.queryResult,null,2),'application/json')};
  $('#pInput').oninput=e=>renderPalette(e.target.value);
  $('#pInput').onkeydown=e=>{
    if(e.key==='Enter'){
      const first=$('#pBody .palette-item');if(first)first.click();
    } else if(e.key==='Escape')closePalette();
  };
  $('#palette').onclick=e=>{if(e.target.id==='palette')closePalette()};
  $('#modal').onclick=e=>{if(e.target.id==='modal')closeModal()};
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette()}
    if(e.key==='Escape'){closePalette();closeModal()}
  });
  // Drag/drop file
  const ov=$('#dropOverlay');
  window.addEventListener('dragover',e=>{e.preventDefault();ov.classList.add('show')});
  window.addEventListener('dragleave',e=>{if(e.clientX===0&&e.clientY===0)ov.classList.remove('show')});
  window.addEventListener('drop',e=>{
    e.preventDefault();ov.classList.remove('show');
    const f=e.dataTransfer.files[0];if(!f)return;
    if(f.name.endsWith('.json')&&!state.activeTbl)importDbFile(f);
    else importFileToTable(f);
  });
}

try{const sig=new BroadcastChannel('fall-signal');sig.postMessage({source:'fallbase',type:'hello',prime:PRIME,version:VERSION,ts:Date.now()});sig.addEventListener('message',e=>{const m=e.data;if(m&&m.type==='ping')sig.postMessage({source:'fallbase',type:'pong',prime:PRIME})})}catch(e){}

// postMessage API — sibling tools talk to fallbase here
window.addEventListener('message',async e=>{
  const m=e.data;if(!m||m.target!=='fallbase'||!m.action)return;
  let r=null,err=null;
  try{
    if(m.action==='ping')r={ok:true,prime:PRIME,version:VERSION};
    else if(m.action==='query'){r={rows:runSQL(m.sql)}}
    else if(m.action==='insert'){
      const t=state.dbs[m.db||state.activeDb]?.tables?.[m.table];
      if(!t)throw new Error('no such table');
      const row={};
      for(const c of t.cols){
        if(c.primary&&c.type==='integer'&&m.row[c.name]==null){let maxv=0;for(const x of t.rows){if(typeof x[c.name]==='number'&&x[c.name]>maxv)maxv=x[c.name]}row[c.name]=maxv+1}
        else row[c.name]=coerce(m.row[c.name],c.type);
      }
      t.rows.push(row);invalidateIndexes(t);persist();renderAll();
      r={ok:true,row};
    } else if(m.action==='list-tables'){r={tables:Object.keys(state.dbs[m.db||state.activeDb]?.tables||{})}}
    else if(m.action==='list-dbs'){r={dbs:Object.keys(state.dbs)}}
    else r={error:'unknown action'};
  }catch(ex){err=ex.message;r={error:err}}
  e.source?.postMessage({target:m.source||'*',responseTo:m.action,data:r},'*');
});
